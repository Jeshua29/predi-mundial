<!doctype html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>World Predictor 2026</title>

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="landing-overlay">

    <div class="landing-card">

        <img
        src="img/mundial-logo.png"
        class="logo-copa">

        <h1>Predicción Mundial</h1>

        <h2>Solo para conocedores de fut ⚽</h2>

        <p class="descripcion">

            Predice cómo terminarán los grupos del Mundial y demuestra quién realmente sabe.

        </p>

        <div class="input-container">

            <label>Nombre</label>

            <input
            type="text"
            id="nombre"
            maxlength="20"
            placeholder="Ejemplo: Joel">

        </div>

        <div class="input-container">

            <label>Contraseña</label>

            <input
            type="password"
            id="password"
            maxlength="20"
            placeholder="••••••••">

        </div>

        <p id="estadoCuenta" class="estado">

            Ingresa tu nombre para comenzar.

        </p>

        <button id="btnComenzar">

            Continuar

        </button>

    </div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
